<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>phonesense · capture</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  /* Fixed-height flex column that never scrolls: the video flexes to fill the
     space above the controls, and the bars keep their natural height. */
  body { margin: 0; background: #111; color: #eee; font-family: system-ui, sans-serif;
         height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  /* contain keeps aspect ratio inside the flex area, so the frame never overflows
     and forces a scrollbar regardless of the camera's resolution. */
  #video { flex: 1 1 auto; min-height: 0; width: 100%; object-fit: contain; background: #000; }
  .bar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 10px; flex: none; }
  .toggles { justify-content: space-between; }      /* camera left, sensors right */
  .toggles button { flex: 1 1 0; min-width: 0; }    /* equal halves, side by side */
  /* camera settings left, sensor settings right. Each group is an equal half, so
     it lines up with — and matches the width of — its Start button above (which
     are also equal halves sharing the same row padding + gap). */
  .settings { flex-wrap: nowrap; align-items: flex-start; }
  .group { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .settings .group { flex: 1 1 0; min-width: 0; }
  /* let the controls fill the width of their half-width group */
  .settings .group label { width: 100%; }
  .settings .group select { flex: 1 1 auto; min-width: 0; }
  .settings .group .seg-group { display: flex; width: 100%; }
  .settings .group .seg-group .seg { flex: 1 1 0; }
  button, select { font-size: 16px; padding: 10px 14px; border-radius: 8px; border: 1px solid #444;
                   background: #222; color: #eee; }
  button.primary { background: #2563eb; border-color: #2563eb; }  /* idle: main CTA */
  button.on { background: #16a34a; border-color: #16a34a; }       /* running: tap to stop */
  /* Rear/Front segmented toggle: two joined buttons, the active one highlighted. */
  .seg-group { display: inline-flex; }
  .seg-group .seg { border-radius: 0; border-left-width: 0; }
  .seg-group .seg:first-child { border-radius: 8px 0 0 8px; border-left-width: 1px; }
  .seg-group .seg:last-child { border-radius: 0 8px 8px 0; }
  .seg.active { background: #2563eb; border-color: #2563eb; }
  button:disabled { opacity: .5; }
  /* keep each label's text on the same row as its selector */
  label { font-size: 14px; opacity: .85; display: inline-flex; align-items: center; gap: 6px;
          white-space: nowrap; }
  .col { flex-direction: column; align-items: stretch; }  /* stack Quality over FPS, full width */
  /* First-tap activation gate */
  #activate { position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column;
              align-items: center; justify-content: center; gap: 14px; padding: 24px;
              text-align: center; background: #111; }
  #activate[hidden] { display: none; }
  #activate button { font-size: 20px; padding: 16px 28px; background: #2563eb; border-color: #2563eb; }
</style>
</head>
<body>
<!-- First-tap gate: blocks the UI until tapped. The tap is the user gesture that
     starts the screen-keep-awake (and Wake Lock), so iOS never shows a play
     button and no control is reachable before the screen is kept on. -->
<div id="activate">
  <button type="button" id="activateBtn">▶&nbsp; Tap to start</button>
</div>
<!-- No autoplay: it has no source until the camera starts, and an empty
     autoplay video makes iOS show a (blocked-autoplay) play button. start()
     calls video.play() explicitly inside the tap gesture instead. -->
<video id="video" playsinline muted></video>
<div class="bar toggles">
  <button id="camBtn" class="primary">Start camera</button>
  <button id="sensorBtn">Start sensors</button>
</div>
<div class="bar settings">
  <div class="group col">
    <div class="seg-group" id="facing" role="group" aria-label="Camera">
      <button type="button" class="seg active" data-facing="environment">Rear</button>
      <button type="button" class="seg" data-facing="user">Front</button>
    </div>
    <label>Quality
      <select id="quality">
        <option value="0.4">Low</option>
        <option value="0.6" selected>Medium</option>
        <option value="0.8">High</option>
      </select>
    </label>
    <label>FPS
      <select id="fps">
        <option>10</option>
        <option selected>15</option>
        <option>24</option>
      </select>
    </label>
  </div>
  <div class="group">
    <label>Sensor Hz
      <select id="rate">
        <option>10</option>
        <option selected>15</option>
        <option>30</option>
        <option>60</option>
      </select>
    </label>
  </div>
</div>

<canvas id="canvas" hidden></canvas>
<!-- Keeps the screen awake where the Wake Lock API is unavailable: a 1px muted
     video playing a canvas-generated stream (same mechanism that keeps the
     screen on during a live camera, but with no camera and no permission). -->
<video id="keepawake" muted loop playsinline disablepictureinpicture
       style="position:fixed; left:0; top:0; width:1px; height:1px; opacity:0; pointer-events:none;"></video>

<script>
const video   = document.getElementById('video');
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const camBtn   = document.getElementById('camBtn');
const sensorBtn = document.getElementById('sensorBtn');
const facingGroup = document.getElementById('facing');
const qualityEl = document.getElementById('quality');
const fpsEl    = document.getElementById('fps');
const rateEl   = document.getElementById('rate');
// No on-screen status line; status is tracked internally so the error gate (an
// 'err' state suppresses later 'ok'/'warn' overwrites) keeps working.
const statusEl = { innerHTML: '', className: '' };

let facing = 'environment';  // 'environment' = rear, 'user' = front
function videoConstraints() {
  return { facingMode: facing, width: { ideal: 640 }, height: { ideal: 480 } };
}

let stream = null;     // MediaStream
let ws = null;         // WebSocket — the one upload socket, shared by camera + sensors
let socketReady = null;// Promise resolving when ws reaches OPEN (rejecting on connect error)
let timer = null;      // capture interval
let wakeLock = null;
let busy = false;      // backpressure: skip a frame if the previous send is in flight
let cameraOn = false;  // camera capture running
let camBusy = false;   // camera start in flight (disables its toggle)
let sensorBusy = false;// sensor enable in flight (disables its toggle)

// One source of truth for the two toggles: blue = idle camera CTA, green = running
// (tap to stop), disabled while a start/enable is mid-flight.
function renderControls() {
  camBtn.textContent = cameraOn ? 'Stop camera' : 'Start camera';
  camBtn.className = cameraOn ? 'on' : 'primary';
  camBtn.disabled = camBusy;
  sensorBtn.textContent = sensorsOn ? 'Stop sensors' : 'Start sensors';
  sensorBtn.className = sensorsOn ? 'on' : 'primary';
  sensorBtn.disabled = sensorBusy;
}

// ---- Motion sensors --------------------------------------------------------
let sensorsOn = false;
let sensorTimer = null;
let geoWatch = null;
const latest = {
  accel: null,     // m/s² including gravity
  linAccel: null,  // m/s² with gravity removed
  gyro: null,      // °/s
  orient: null,    // {alpha,beta,gamma}
  heading: null,   // compass heading, ° (0=N)
  gps: null,       // {lat,lon,alt,speed,acc}
};

function onMotion(e) {
  const a = e.accelerationIncludingGravity;
  if (a && a.x !== null) latest.accel = { x: a.x, y: a.y, z: a.z };
  const la = e.acceleration; // gravity removed (may be null on some devices)
  if (la && la.x !== null) latest.linAccel = { x: la.x, y: la.y, z: la.z };
  const r = e.rotationRate;
  if (r && r.alpha !== null) latest.gyro = { x: r.beta, y: r.gamma, z: r.alpha }; // deg/s
}
function onOrient(e) {
  if (e.alpha !== null) latest.orient = { alpha: e.alpha, beta: e.beta, gamma: e.gamma };
  // Compass heading: iOS exposes webkitCompassHeading; absolute events give true north.
  if (typeof e.webkitCompassHeading === 'number') latest.heading = e.webkitCompassHeading;
  else if (e.absolute && e.alpha !== null) latest.heading = 360 - e.alpha; // approx true heading
}

// Sensors toggle (right button). Works with or without the camera.
async function onSensorClick() {
  keepScreenOn();  // gesture-time retry for browsers that require one
  if (sensorBusy) return;
  if (sensorsOn) {
    stopSensors();
    closeSocketIfIdle();
    renderControls();
    if (statusEl.className !== 'err') {
      setStatus(cameraOn ? 'Sensors stopped. Camera still streaming ✓' : 'Sensors stopped.',
                cameraOn ? 'ok' : '');
    }
    return;
  }
  sensorBusy = true; renderControls();
  try {
    // iOS 13+ requires a permission request from a user gesture.
    const DM = window.DeviceMotionEvent, DO = window.DeviceOrientationEvent;
    if (DM && typeof DM.requestPermission === 'function') {
      const r = await DM.requestPermission();
      if (r !== 'granted') throw new Error('motion permission denied');
    }
    if (DO && typeof DO.requestPermission === 'function') {
      await DO.requestPermission().catch(() => {});
    }
    // Same function reference each time, so a re-enable after a drop won't double-register.
    window.addEventListener('devicemotion', onMotion);
    window.addEventListener('deviceorientation', onOrient);
    // Absolute orientation (true compass heading) where available.
    window.addEventListener('deviceorientationabsolute', onOrient);

    // GPS (best-effort; permission prompt is separate, may be denied/unavailable).
    if (navigator.geolocation && geoWatch === null) {
      geoWatch = navigator.geolocation.watchPosition((pos) => {
        const c = pos.coords;
        latest.gps = {
          lat: c.latitude, lon: c.longitude, alt: c.altitude,
          speed: c.speed, acc: c.accuracy,
        };
      }, () => {}, { enableHighAccuracy: true, maximumAge: 1000 });
    }

    // Open the upload socket if the camera hasn't already — sensors stream over
    // the same connection and work with or without the camera running.
    await ensureSocket();
    sensorsOn = true;
    startSensorLoop();
    if (!cameraOn && statusEl.className !== 'err') {
      setStatus('Sensors streaming ✓ — open the dashboard on your computer.', 'ok');
    }
  } catch (err) {
    setStatus('Sensors unavailable: ' + err.message, 'warn');
    closeSocketIfIdle();
  } finally {
    sensorBusy = false; renderControls();
  }
}

function startSensorLoop() {
  if (sensorTimer) clearInterval(sensorTimer);
  const hz = parseInt(rateEl.value, 10) || 15;
  sensorTimer = setInterval(() => {
    if (!sensorsOn || !ws || ws.readyState !== WebSocket.OPEN) return;
    if (!latest.accel && !latest.gyro && !latest.orient) return;
    ws.send(JSON.stringify({
      type: 'sensor',
      t: Date.now(),
      accel: latest.accel,
      linAccel: latest.linAccel,
      gyro: latest.gyro,
      orient: latest.orient,
      heading: latest.heading,
      gps: latest.gps,
    }));
  }, Math.round(1000 / hz));
}

// Change the send rate live when the selector changes.
rateEl.addEventListener('change', () => { if (sensorsOn) startSensorLoop(); });

function setStatus(msg, cls) {
  statusEl.innerHTML = msg;
  statusEl.className = cls || '';
}

// Keep the screen awake for the whole page (not just while the camera runs), so
// a phone left on a desk streaming sensors — or nothing — never sleeps.
//
// Most browsers only grant the lock from a user gesture and silently reject the
// page-load attempt, so we (re)request it on the first tap and on every later
// gesture, when the tab becomes visible again (it's auto-dropped while hidden),
// and if it's released back to us while still on-screen. Each path is a no-op
// once the lock is held.
async function acquireWakeLock() {
  try {
    if ('wakeLock' in navigator && (!wakeLock || wakeLock.released)) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => {
        if (document.visibilityState === 'visible') acquireWakeLock();
      });
    }
  } catch (e) { /* non-fatal — retried on the next gesture / visibility change */ }
}

// Fallback for browsers/devices where the Wake Lock API isn't honored: play a
// muted canvas-backed video. Playing a MediaStream in a <video> holds the screen
// on the same way the live camera does, but needs no camera and runs whether or
// not the camera/sensors are active. Idempotent; safe to call alongside the lock.
//
// MUST be first invoked from a user gesture: iOS blocks autoplay otherwise and
// shows a play button on the (1px) video. So it's only reached via keepScreenOn()
// on a tap, never at page load.
const keepAwakeVideo = document.getElementById('keepawake');
let keepAwakeStarted = false;
function startScreenKeepAwake() {
  if (keepAwakeStarted) { keepAwakeVideo.play().catch(() => {}); return; }
  try {
    const c = document.createElement('canvas');
    c.width = c.height = 2;
    const cx = c.getContext('2d');
    // Repaint periodically so the captured stream keeps emitting frames.
    let on = false;
    setInterval(() => { on = !on; cx.fillStyle = on ? '#000' : '#010101'; cx.fillRect(0, 0, 2, 2); }, 1000);
    keepAwakeVideo.srcObject = c.captureStream();
    keepAwakeStarted = true;
    keepAwakeVideo.play().catch(() => {});
  } catch (e) { /* captureStream unsupported — rely on the Wake Lock API */ }
}

// Engaged from the first tap (and later gestures). Always try the Wake Lock API;
// only fall back to the video where the API is absent, so modern Android/desktop/
// iOS use the efficient lock and skip the continuous video decode. (Checked
// synchronously, not via the lock's async result, so the video's play() stays
// inside the user gesture iOS requires.)
function keepScreenOn() {
  acquireWakeLock();
  if (!('wakeLock' in navigator)) startScreenKeepAwake();
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return;
  acquireWakeLock();
  // Resume the fallback only if a prior gesture already started it (re-creating
  // it here, without a gesture, would re-trigger iOS's play button).
  if (keepAwakeStarted) keepAwakeVideo.play().catch(() => {});
});
// Any tap is a valid user gesture; cheap because both paths no-op once engaged.
document.addEventListener('pointerdown', keepScreenOn);

// ---- Upload socket (shared by camera + sensors) ----------------------------
// One WebSocket to /ingest carries both JPEG frames (binary) and sensor JSON
// (text). Whichever feature starts first opens it; the other reuses it. It stays
// up while either is active and is dropped once both stop.
function ensureSocket() {
  if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) {
    return socketReady;
  }
  const wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ingest';
  ws = new WebSocket(wsUrl);
  ws.binaryType = 'arraybuffer';
  socketReady = new Promise((resolve, reject) => {
    ws.addEventListener('open', () => resolve(), { once: true });
    ws.addEventListener('error', () => reject(new Error('connection failed')), { once: true });
  });
  ws.onclose = onSocketClose;
  return socketReady;
}

// Unexpected close (network drop, or another phone taking over): the transport
// is gone, so tear down both producers and reset the UI.
function onSocketClose(ev) {
  const why = ev.reason ||
    (ev.code === 1001 ? 'another device connected to the server'
                      : 'connection closed (code ' + ev.code + ')');
  ws = null;
  socketReady = null;
  stopCamera();
  stopSensors();
  renderControls();
  if (statusEl.className !== 'err') setStatus('Disconnected: ' + why, 'warn');
}

// Drop the socket once nothing needs it. Detach onclose first so this
// intentional close stays silent (no "Disconnected" banner).
function closeSocketIfIdle() {
  if (ws && !cameraOn && !sensorsOn) {
    ws.onclose = null;
    try { ws.close(); } catch (e) {}
    ws = null;
    socketReady = null;
  }
}

// Camera toggle (left button). Works with or without the sensors.
async function onCamClick() {
  keepScreenOn();  // gesture-time retry for browsers that require one
  if (camBusy) return;
  if (cameraOn) {
    stopCamera();
    closeSocketIfIdle();
    renderControls();
    if (statusEl.className !== 'err') {
      setStatus(sensorsOn ? 'Camera stopped. Sensors still streaming ✓' : 'Camera stopped.',
                sensorsOn ? 'ok' : '');
    }
    return;
  }
  camBusy = true; renderControls();
  try {
    setStatus('Requesting camera…', 'warn');
    stream = await navigator.mediaDevices.getUserMedia({ video: videoConstraints(), audio: false });
    video.srcObject = stream;
    await video.play();

    // Open the upload socket, or reuse the one sensors already opened.
    await ensureSocket();
    cameraOn = true;
    setStatus('Camera streaming ✓ — open the dashboard on your computer.', 'ok');
    startCaptureLoop();
  } catch (e) {
    setStatus('Camera/connection failed: ' + e.message, 'err');
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    closeSocketIfIdle();
  } finally {
    camBusy = false; renderControls();
  }
}

function startCaptureLoop() {
  const fps = parseInt(fpsEl.value, 10);
  const quality = parseFloat(qualityEl.value);
  const track = stream.getVideoTracks()[0];
  const { width, height } = track.getSettings();
  canvas.width  = width  || 640;
  canvas.height = height || 480;

  timer = setInterval(() => {
    if (busy || !ws || ws.readyState !== WebSocket.OPEN) return;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    busy = true;
    canvas.toBlob((blob) => {
      if (blob && ws && ws.readyState === WebSocket.OPEN) {
        blob.arrayBuffer().then((buf) => {
          try { ws.send(buf); } catch (e) { /* dropped */ }
          busy = false;
        });
      } else {
        busy = false;
      }
    }, 'image/jpeg', quality);
  }, Math.round(1000 / fps));
}

// ---- Rear/Front toggle -----------------------------------------------------
// Highlight the active facing and, if the camera is already running, switch to
// it live — re-acquiring just the video stream without dropping the socket or
// the sensor stream.
function renderFacing() {
  facingGroup.querySelectorAll('.seg').forEach((b) => {
    b.classList.toggle('active', b.dataset.facing === facing);
  });
}

async function setFacing(next) {
  if (next === facing) return;
  facing = next;
  renderFacing();
  if (!cameraOn) return;  // not streaming yet — applies on next Start
  setStatus('Switching camera…', 'warn');
  let next_stream;
  try {
    next_stream = await navigator.mediaDevices.getUserMedia({ video: videoConstraints(), audio: false });
  } catch (e) {
    setStatus('Could not switch camera: ' + e.message, 'warn');
    return;
  }
  if (stream) stream.getTracks().forEach((t) => t.stop());
  stream = next_stream;
  video.srcObject = stream;
  try { await video.play(); } catch (e) { /* autoplay quirks, non-fatal */ }
  if (timer) { clearInterval(timer); timer = null; }  // restart loop to pick up new frame size
  startCaptureLoop();
  setStatus('Camera streaming ✓ — open the dashboard on your computer.', 'ok');
}

facingGroup.querySelectorAll('.seg').forEach((b) => {
  b.addEventListener('click', () => setFacing(b.dataset.facing));
});

// Tear down just the camera's resources (capture loop + media stream). Caller
// re-renders the controls and sets status; the socket, the sensor stream, and
// the screen wake lock (page-level) are left untouched.
function stopCamera() {
  if (timer) { clearInterval(timer); timer = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  cameraOn = false;
  busy = false;
}

// Tear down just the sensor stream. Motion listeners stay registered (cheap and
// idempotent); the GPS watch is released since it drains battery.
function stopSensors() {
  if (sensorTimer) { clearInterval(sensorTimer); sensorTimer = null; }
  if (geoWatch !== null) { navigator.geolocation.clearWatch(geoWatch); geoWatch = null; }
  sensorsOn = false;
}

camBtn.addEventListener('click', onCamClick);
sensorBtn.addEventListener('click', onSensorClick);
renderControls();

// First tap activates: engage the screen-keep-awake within the gesture, then
// drop the gate so the camera/sensor controls become usable.
document.getElementById('activate').addEventListener('click', function activate(e) {
  keepScreenOn();
  e.currentTarget.hidden = true;
}, { once: true });

// Try the Wake Lock on load (granted without a gesture where supported, e.g.
// Android Chrome). The canvas-video fallback can't run until the first tap —
// iOS blocks gesture-free autoplay — so it's engaged by the pointerdown handler.
acquireWakeLock();
</script>
</body>
</html>
