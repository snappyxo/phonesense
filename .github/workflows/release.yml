name: release

# Build and publish to PyPI when a version tag (v*) is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no stored token.
#
# One-time setup on PyPI before the first release:
#   PyPI → your account → Publishing → add a "pending publisher":
#     Project name:   phonesense
#     Owner:          snappyxo
#     Repository:     phonesense
#     Workflow name:  release.yml
#     Environment:    pypi
# Then push a tag:  git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
